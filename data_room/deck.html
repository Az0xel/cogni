<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cognitronics Pitch Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e0f;
  --surface:#141415;
  --surface-offset:#1f1f22;
  --border:rgba(255,255,255,0.08);
  --text:#e8e8ea;
  --text-muted:#8a8a90;
  --text-faint:#4a4a52;
  --primary:#39d091;
  --primary-hover:#2eb57d;
  --primary-hi:rgba(57,208,145,0.15);
  --font:'Inter',sans-serif;
  --r-sm:0.375rem;--r-md:0.5rem;--r-lg:0.75rem;--r-full:9999px;
  --shadow-lg:0 12px 48px rgba(0,0,0,0.7);
  --ease:180ms cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{min-height:100dvh;font-family:var(--font);font-size:1rem;color:var(--text);background:var(--bg);overflow:hidden;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}

.matrix-bg{
  position:absolute;inset:0;z-index:0;overflow:hidden;
  background:var(--bg);pointer-events:none;
}
.matrix-canvas{
  position:absolute;inset:0;width:100%;height:100%;
  display:block;pointer-events:none;
}
.matrix-overlay{
  position:absolute;inset:0;z-index:1;
  background:rgba(0,0,0,0.4);pointer-events:none;
}

#viewer{position:fixed;inset:0;display:flex;flex-direction:column;}

.v-header{
  height:52px;padding:0 1.5rem;flex-shrink:0;
  display:flex;align-items:center;
  background:var(--surface);border-bottom:1px solid var(--border);z-index:20;
}
.v-logo{display:flex;align-items:center;}
.v-logo a{display:flex;align-items:center;line-height:0;}
.v-logo-img{height:28px;width:auto;display:block;}

.v-stage{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

.side-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:44px;height:44px;border-radius:50%;
  background:rgba(20,20,21,0.85);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--primary);backdrop-filter:blur(8px);
  transition:background var(--ease),opacity var(--ease);
  z-index:15;
}
.side-nav:hover{background:var(--surface-offset);}
.side-nav:disabled{opacity:.2;pointer-events:none;}
.side-nav.left{left:1rem;}
.side-nav.right{right:1rem;}

.slide-frame{
  position:relative;z-index:10;
  width:min(92vw, calc((100dvh - 52px - 68px) * 16 / 9));
  aspect-ratio:16/9;
  border-radius:var(--r-lg);overflow:hidden;
  box-shadow:var(--shadow-lg);border:1px solid var(--border);
  user-select:none;-webkit-user-select:none;
}
.slide-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  opacity:0;
  transition:opacity 320ms ease,transform 320ms ease;
  pointer-events:none;
}
.slide-img.entering{opacity:0;transform:translateX(30px);}
.slide-img.active{opacity:1;transform:translateX(0);}

.link-zone{
  position:absolute;border-radius:var(--r-sm);
  cursor:pointer;transition:background var(--ease),box-shadow var(--ease);
}
.link-zone:hover{background:rgba(57,208,145,.18);box-shadow:0 0 0 2px rgba(57,208,145,.5);}
.link-badge{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:.35rem;
  padding:.25rem .6rem;background:var(--surface-offset);border:1px solid var(--border);
  border-radius:var(--r-full);font-size:0.75rem;color:var(--text);white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity var(--ease);
}
.link-zone:hover .link-badge{opacity:1;}
.link-icon-pin{
  position:absolute;top:6px;right:6px;
  width:18px;height:18px;border-radius:50%;
  background:var(--primary);display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(57,208,145,.5);pointer-events:none;
}
.link-icon-pin svg{width:10px;height:10px;color:#fff;}
.link-zone--compact:hover{background:transparent;box-shadow:none;}
.link-zone--compact .link-icon-pin{
  top:0;right:0;transform:translate(50%, -50%);
  width:14px;height:14px;
}
.link-zone--compact .link-icon-pin svg{width:8px;height:8px;}
.link-zone--compact .link-badge{
  bottom:auto;top:calc(100% + 4px);left:auto;right:0;transform:none;
}

.v-controls{
  height:68px;padding:0 1.5rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border-top:1px solid var(--border);
}
.ctrl-group{display:flex;align-items:center;gap:.75rem;}
.ctrl-btn{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-md);border:1px solid var(--border);color:var(--primary);
  transition:background var(--ease);
}
.ctrl-btn:hover{background:var(--surface-offset);}
.ctrl-btn:disabled{opacity:.3;pointer-events:none;}
.progress-dots{display:flex;gap:.5rem;align-items:center;}
.p-dot{
  width:8px;height:8px;border-radius:50%;background:var(--surface-offset);
  transition:background var(--ease),transform var(--ease);cursor:pointer;padding:0;
}
.p-dot.active{background:var(--primary);transform:scale(1.35);}
.slide-count{font-size:0.75rem;color:var(--text-faint);font-variant-numeric:tabular-nums;min-width:48px;text-align:center;}
</style>
</head>
<body>

<div id="viewer">
  <header class="v-header">
    <div class="v-logo">
      <a href="https://cognitronics.site" aria-label="Back to Cognitronics homepage">
        <img class="v-logo-img" src="media/coglog.png" alt="Cognitronics" width="140" height="28" />
      </a>
    </div>
  </header>

  <div class="v-stage" id="stage">
    <div class="matrix-bg" aria-hidden="true">
      <canvas id="stage-matrix" class="matrix-canvas"></canvas>
      <div class="matrix-overlay"></div>
    </div>
    <button class="side-nav left" id="prev-side" disabled aria-label="Previous">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="slide-frame" id="slide-frame"></div>
    <button class="side-nav right" id="next-side" aria-label="Next">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="v-controls">
    <div class="ctrl-group">
      <button class="ctrl-btn" id="prev-ctrl" disabled aria-label="Previous">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="ctrl-btn" id="next-ctrl" aria-label="Next">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="progress-dots" id="prog-dots"></div>
    <div class="ctrl-group">
      <span class="slide-count" id="slide-count">1 / 15</span>
    </div>
  </div>
</div>

<script>
function initMatrixRain(canvas){
  if(!canvas) return null;
  const panel = canvas.parentElement;
  if(!panel) return null;
  const ctx = canvas.getContext('2d');
  const fontSize = 10;
  const chars = '0123456789ABCDEF'.split('');
  const colors = ['#7CF3BF', '#39D091', '#14784D', '#bab21c', '#dadada'];
  let drops = [];

  function resizeCanvas(){
    canvas.width = panel.offsetWidth;
    canvas.height = panel.offsetHeight;
    const cols = Math.floor(canvas.width / fontSize);
    drops = [];
    for(let i = 0; i < cols; i++) drops[i] = Math.floor(Math.random() * canvas.height);
    ctx.font = fontSize + 'px monospace';
  }

  function rain(){
    ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for(let i = 0; i < drops.length; i++){
      ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
      ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, drops[i] * fontSize);
      if(Math.random() > 0.99) drops[i] = 0;
      drops[i]++;
    }
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  setInterval(rain, 50);
  return { resize: resizeCanvas };
}

const stageMatrix = initMatrixRain(document.getElementById('stage-matrix'));

const SLIDES = Array.from({ length: 15 }, (_, i) => ({
  id: i + 1,
  img: `slides/slide_${String(i).padStart(2, '0')}.jpeg`,
}));

const REF_W = 2000;
const REF_H = 1125;
function zone(slide, label, url, x, y, w, h) {
  return {
    slide, label, url,
    left: `${(x / REF_W * 100).toFixed(2)}%`,
    top: `${(y / REF_H * 100).toFixed(2)}%`,
    w: `${(w / REF_W * 100).toFixed(2)}%`,
    h: `${(h / REF_H * 100).toFixed(2)}%`,
  };
}

const LINK_ZONES = [
  zone(2, '2411.02704', 'https://arxiv.org/html/2411.02704v1', 1057.94, 398.94, 272, 273),
  zone(2, '2506.13498', 'https://arxiv.org/html/2506.13498v1', 1331, 392, 241, 292),
  zone(2, 'RSS21 p053', 'https://www.roboticsproceedings.org/rss21/p053.pdf', 1505, 480, 222, 234),
  zone(2, 'OpenReview', 'https://openreview.net/forum?id=W0AY49wWrb', 1716, 440, 256, 431),
  zone(2, '2407.06886', 'https://arxiv.org/html/2407.06886v1', 1121, 677, 257, 358),
  zone(2, '2505.05074', 'https://arxiv.org/pdf/2505.05074', 1358, 689, 256, 361),
  zone(2, '2606.02551', 'https://arxiv.org/html/2606.02551v1', 1613, 707, 263, 332),
  zone(11, 'THMS · Web', 'https://web3safer.com', 808.91, 292.46, 61.18, 62.09),
  zone(11, 'THMS · LinkedIn', 'https://www.linkedin.com/in/problem-solveur', 871.91, 292.46, 63.18, 62.09),
  zone(11, 'THMS · GitHub', 'https://github.com/Az0xel', 934.91, 292.46, 63.18, 62.09),
  zone(11, 'JSPH · Hugging Face', 'https://huggingface.co/Tonic', 1753.91, 292.46, 63.18, 62.09),
  zone(11, 'JSPH · LinkedIn', 'https://www.linkedin.com/in/josephpollack/', 1816.91, 292.46, 63.18, 62.09),
  zone(11, 'JSPH · GitHub', 'https://github.com/Josephrp', 1879.91, 292.46, 63.18, 62.09),
  zone(11, 'DALI · LinkedIn', 'https://www.linkedin.com/in/dalilahassaine', 934.91, 518.46, 63.18, 62.09),
  zone(11, 'NADR · LinkedIn', 'https://www.linkedin.com/in/naderg', 1879.91, 518.46, 63.18, 62.09),
  zone(11, 'MAXM · Site', 'https://hellomax.io/', 808.91, 744.46, 63.18, 62.09),
  zone(11, 'MAXM · LinkedIn', 'https://www.linkedin.com/in/maxime-auburtin', 871.91, 744.46, 63.18, 62.09),
  zone(11, 'MAXM · GitHub', 'https://github.com/manthis', 934.91, 744.46, 63.18, 62.09),
  zone(15, 'Demo video', 'https://drive.google.com/file/d/1sSaB_wFg9I386kvT7EZXDGtVqG7qRtv5/view?usp=drive_link', 1685, 728, 233, 303),
];

const S = { current: 1 };
const N = SLIDES.length;

function initViewer(){
  requestAnimationFrame(() => stageMatrix?.resize());
  buildSlides();
  buildDots();
  buildLinkZones();
  bindNav();
  bindSwipe();
  bindKeys();
  showLinkZones(1);
  updateControls();
}

function buildSlides(){
  const frame = document.getElementById('slide-frame');
  SLIDES.forEach((sl, i) => {
    const img = document.createElement('img');
    img.className = 'slide-img' + (i === 0 ? ' active' : '');
    img.src = sl.img;
    img.alt = `Slide ${sl.id}`;
    img.dataset.slide = sl.id;
    frame.appendChild(img);
  });
}

function buildLinkZones(){
  const frame = document.getElementById('slide-frame');
  LINK_ZONES.forEach(z => {
    const el = document.createElement('div');
    el.className = 'link-zone' + (z.slide === 11 ? ' link-zone--compact' : '');
    el.dataset.slide = z.slide;
    el.style.cssText = `top:${z.top};left:${z.left};width:${z.w};height:${z.h};display:none;`;
    el.innerHTML = `
      <div class="link-badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        ${z.label}
      </div>
      <div class="link-icon-pin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </div>`;
    el.addEventListener('click', () => window.open(z.url, '_blank', 'noopener'));
    frame.appendChild(el);
  });
}

function buildDots(){
  const el = document.getElementById('prog-dots');
  for(let i = 1; i <= N; i++){
    const b = document.createElement('button');
    b.className = 'p-dot' + (i === 1 ? ' active' : '');
    b.dataset.n = i;
    b.setAttribute('aria-label', `Slide ${i}`);
    b.addEventListener('click', () => goTo(Number(b.dataset.n)));
    el.appendChild(b);
  }
}

function goTo(n){
  if(n < 1 || n > N || n === S.current) return;
  const fromEl = getSlideEl(S.current);
  if(fromEl) fromEl.classList.remove('active');

  S.current = n;
  const toEl = getSlideEl(n);
  if(toEl){
    toEl.classList.add('entering');
    requestAnimationFrame(() => {
      toEl.classList.remove('entering');
      toEl.classList.add('active');
    });
  }

  showLinkZones(n);
  updateControls();
  updateDots();
}

function getSlideEl(n){
  return document.querySelector(`#slide-frame [data-slide="${n}"].slide-img`);
}

function showLinkZones(n){
  document.querySelectorAll('.link-zone').forEach(z => {
    z.style.display = Number(z.dataset.slide) === n ? 'block' : 'none';
  });
}

function bindNav(){
  document.getElementById('prev-side').addEventListener('click', () => goTo(S.current - 1));
  document.getElementById('next-side').addEventListener('click', () => goTo(S.current + 1));
  document.getElementById('prev-ctrl').addEventListener('click', () => goTo(S.current - 1));
  document.getElementById('next-ctrl').addEventListener('click', () => goTo(S.current + 1));
}

function bindKeys(){
  document.addEventListener('keydown', e => {
    if(['ArrowRight', 'ArrowDown'].includes(e.key)) goTo(S.current + 1);
    if(['ArrowLeft', 'ArrowUp'].includes(e.key)) goTo(S.current - 1);
  });
}

function bindSwipe(){
  const stage = document.getElementById('stage');
  let x0 = null;
  stage.addEventListener('touchstart', e => { x0 = e.touches[0].clientX; }, { passive: true });
  stage.addEventListener('touchend', e => {
    if(x0 === null) return;
    const dx = e.changedTouches[0].clientX - x0;
    if(Math.abs(dx) > 40) dx < 0 ? goTo(S.current + 1) : goTo(S.current - 1);
    x0 = null;
  }, { passive: true });
}

function updateControls(){
  const atFirst = S.current === 1;
  const atLast = S.current === N;
  document.getElementById('prev-side').disabled = atFirst;
  document.getElementById('next-side').disabled = atLast;
  document.getElementById('prev-ctrl').disabled = atFirst;
  document.getElementById('next-ctrl').disabled = atLast;
  document.getElementById('slide-count').textContent = `${S.current} / ${N}`;
}

function updateDots(){
  document.querySelectorAll('.p-dot').forEach((d, i) => {
    d.classList.toggle('active', i + 1 === S.current);
  });
}

initViewer();
</script>
</body>
</html>
