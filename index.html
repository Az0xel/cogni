<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />

    <!-- Canonical URL: https://cognitronics.site/ -->

    <!-- Primary SEO -->

    <meta

      content="We are building a physical cognition acquisition layer for humanoid robots."
    />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://cognitronics.site/" />

    <!-- Favicons -->
    <link rel="icon" href="16x16.png" sizes="16x16" type="image/png" />
    <link rel="icon" href="32x32.png" sizes="32x32" type="image/png" />

    <!-- Open Graph -->
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cognitronics" />
    <meta property="og:title" content="Cognitronics" />
    <meta
      property="og:description"
      content="We are building a physical cognition acquisition layer for humanoid robots."
    />
    <meta property="og:url" content="https://cognitronics.site/" />
    <meta property="og:image" content="https://cognitronics.site/summary_large_image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Cognitronics" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cognitronics" />
    <meta
      name="twitter:description"
      content="We are building a physical cognition acquisition layer for humanoid robots."
    />
    <meta name="twitter:image" content="https://cognitronics.site/summary_large_image.jpg" />
    <meta name="twitter:image:alt" content="Cognitronics" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "Cognitronics",
            "url": "https://cognitronics.site/",
            "email": "cognitronics@proton.me"
          },
          {
            "@type": "WebSite",
            "name": "Cognitronics",
            "url": "https://cognitronics.site/",
            "publisher": { "@type": "Organization", "name": "Cognitronics" }
          }
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&family=Rajdhani:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../components/ui/w3s-button.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        height: 100%;
        height: 100dvh;
        background: #000;
      }

      body {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        background: #000;
        color: #fff;
        overflow-x: hidden;
      }

      /* Full-viewport canvas host (homepage matrix sizing target) */
      .lp-shell {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      .lp-matrix {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
        display: block;
      }

      .lp-stage {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-inline: clamp(12px, 4vw, 32px);
        padding-block: clamp(96px, 18vw, 120px) clamp(32px, 8vw, 48px);
      }

      .lp-hero {
        display: flex;
        justify-content: center;
        align-items: stretch;
        width: 100%;
      }

      /* Single sizing context: logo + CTA widths track together via container queries (cqi) */
      .lp-hero__container {
        container-type: inline-size;
        container-name: lp-hero;
        --lp-hero-w: 50vw;
        width: min(var(--lp-hero-w), 100%);
        margin-inline: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(1.75rem, 4.5vw, 3.25rem);
      }

      .lp-logo-wrap {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
        width: 100%;
      }

      .lp-logo {
        width: 100%;
        height: auto;
        display: block;
        object-fit: contain;
        pointer-events: none;
      }

      /* Portrait phones ≤480 */
      @media (max-width: 480px) and (orientation: portrait) {
        .lp-hero__container {
          --lp-hero-w: 90vw;
        }
      }

      /* Short landscape (phones ~≤932×500): fit stack + true vertical centre (symmetric slack top/bottom) */
      @media (orientation: landscape) and (max-height: 500px) and (max-width: 932px) {
        html {
          overflow-y: hidden;
        }

        .lp-stage {
          box-sizing: border-box;
          flex-direction: column;
          justify-content: center;
          align-items: stretch;
          min-height: 100svh;
          min-height: 100dvh;
          height: auto;
          max-height: 100svh;
          max-height: 100dvh;
          padding-inline: clamp(12px, 4vw, 24px);
          /* Native safe areas only — remaining slack balances via justify-content */
          padding-block-start: env(safe-area-inset-top, 0px);
          padding-block-end: env(safe-area-inset-bottom, 0px);
          overflow-x: clip;
          overflow-y: clip;
        }

        .lp-hero {
          display: flex;
          justify-content: center;
          flex: none;
          width: 100%;
          min-height: 0;
          max-height: calc(
            100svh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)
          );
          max-height: calc(
            100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px)
          );
        }

        .lp-hero__container {
          display: grid;
          grid-template-columns: minmax(0, 1fr);
          grid-template-rows: minmax(0, 1fr) auto;
          justify-items: center;
          gap: clamp(0.55rem, 4dvh, 1rem);
          width: min(var(--lp-hero-w), 100%);
          max-height: 100%;
          min-height: 0;
          align-self: center;
        }

        .lp-logo-wrap {
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 0;
          overflow: hidden;
          width: 100%;
        }

        .lp-logo {
          width: auto;
          height: auto;
          max-width: 100%;
          max-height: 100%;
          object-fit: contain;
          object-position: center;
        }

        .lp-cta-row {
          flex-shrink: 0;
        }
      }

      .lp-cta-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: stretch;
        justify-items: stretch;
        gap: clamp(0.5rem, 3cqi, 1.25rem);
        width: 100%;
        max-width: 100%;
      }

      .lp-mail {
        position: relative;
        z-index: 10;
        text-decoration: none;
        color: inherit;
        outline: none;
        min-width: 0;
      }

      .lp-mail:focus-visible .lp-mail__metal {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          inset 0 -1px 0 rgba(0, 0, 0, 0.55),
          0 0 0 2px rgba(57, 208, 145, 0.45),
          0 8px 28px rgba(0, 0, 0, 0.45);
      }

      /* Minimal button shell (standalone page; upstream w3s-button.css optional) */
      .lp-mail .w3s-button {
        display: block;
        width: 100%;
      }

      .lp-mail .lp-mail__metal.w3s-button__inner {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
        gap: 0.65em;
        padding: 0.62em 1.65em;
        font-family: "Rajdhani", "Poppins", system-ui, sans-serif;
        /* Fallback without container queries: keyed to viewport; scales with lp-hero__container width (~50vw or 90vw portrait) */
        font-size: clamp(0.8rem, 2.95vw + 0.25rem, 1.125rem);
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(226, 232, 236, 0.96);
        text-shadow:
          0 0 1px rgba(0, 0, 0, 0.95),
          0 1px 0 rgba(255, 255, 255, 0.12);
        background: linear-gradient(
          178deg,
          #4f5c62 0%,
          #2b3236 38%,
          #121618 52%,
          #1f2629 74%,
          #343d42 100%
        );
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.2),
          inset 0 -2px 0 rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(0, 0, 0, 0.85),
          0 12px 32px rgba(0, 0, 0, 0.4);
        clip-path: polygon(
          11px 0,
          calc(100% - 11px) 0,
          100% 11px,
          100% calc(100% - 11px),
          calc(100% - 11px) 100%,
          11px 100%,
          0 calc(100% - 11px),
          0 11px
        );
        overflow: hidden;
        transition:
          border-color 0.35s ease,
          box-shadow 0.35s ease,
          color 0.35s ease;
      }

      @container lp-hero (min-width: 0) {
        .lp-mail .lp-mail__metal.w3s-button__inner {
          font-size: clamp(0.75rem, 5.6cqi + 0.45rem, 1.2rem);
        }
      }

      .lp-mail .lp-mail__metal.w3s-button__inner::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.35;
        background: linear-gradient(125deg, transparent 42%, rgba(255, 255, 255, 0.12) 50%, transparent 58%);
        mix-blend-mode: overlay;
        pointer-events: none;
        z-index: 0;
      }

      .lp-mail .lp-mail__sweep {
        pointer-events: none;
        position: absolute;
        top: -25%;
        left: -120%;
        width: 80%;
        height: 150%;
        background: linear-gradient(
          90deg,
          transparent 0%,
          transparent 38%,
          rgba(57, 208, 145, 0.05) 45%,
          rgba(57, 208, 145, 0.55) 50%,
          rgba(122, 243, 191, 0.42) 52%,
          rgba(57, 208, 145, 0.12) 60%,
          transparent 72%,
          transparent 100%
        );
        filter: blur(6px);
        transform: skewX(-16deg);
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 1;
      }

      .lp-mail:hover .lp-mail__sweep,
      .lp-mail:focus-visible .lp-mail__sweep {
        opacity: 1;
        animation: lp-mail-sweep 0.75s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes lp-mail-sweep {
        from {
          transform: skewX(-16deg) translateX(0%);
        }
        to {
          transform: skewX(-16deg) translateX(310%);
        }
      }

      .lp-mail:not(:hover):not(:focus-visible) .lp-mail__sweep {
        animation: none;
      }

      .lp-mail:hover .lp-mail__metal.w3s-button__inner,
      .lp-mail:focus-visible .lp-mail__metal.w3s-button__inner {
        border-color: rgba(57, 208, 145, 0.35);
        color: rgba(237, 255, 246, 0.98);
        box-shadow:
          inset 0 1px 0 rgba(124, 243, 191, 0.18),
          inset 0 -2px 0 rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(0, 0, 0, 0.92),
          0 12px 40px rgba(0, 0, 0, 0.5),
          0 0 24px rgba(57, 208, 145, 0.12);
      }

      .lp-mail .w3s-button__icon {
        position: relative;
        z-index: 2;
        width: 1.35em;
        height: 1.35em;
        flex-shrink: 0;
        stroke: rgba(180, 200, 205, 0.85);
        fill: none;
        stroke-width: 1.6;
        filter: drop-shadow(0 0 8px rgba(57, 208, 145, 0.15));
        transition: stroke 0.35s ease, filter 0.35s ease;
      }

      .lp-mail:hover .w3s-button__icon,
      .lp-mail:focus-visible .w3s-button__icon {
        stroke: rgba(124, 243, 191, 0.95);
        filter: drop-shadow(0 0 10px rgba(57, 208, 145, 0.35));
      }

      .lp-mail .w3s-button__text {
        display: inline-flex;
        align-items: center;
        position: relative;
        z-index: 2;
      }

      /* Portrait phones: short labels; landscape keeps full copy */
      .lp-cta__label--narrow {
        display: none;
      }

      @media (max-width: 480px) and (orientation: portrait) {
        .lp-cta__label--wide {
          display: none;
        }
        .lp-cta__label--narrow {
          display: inline-block;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .lp-mail:hover .lp-mail__sweep,
        .lp-mail:focus-visible .lp-mail__sweep {
          animation: none;
          left: -20%;
          width: 140%;
          opacity: 0.35;
          filter: blur(12px);
        }
      }
    </style>
  </head>
  <body>
    <div class="lp-shell" aria-hidden="true">
      <canvas id="matrix-rain" class="lp-matrix"></canvas>
    </div>

    <main class="lp-stage">
      <div class="lp-hero">
        <div class="lp-hero__container">
          <div class="lp-logo-wrap">
            <img class="lp-logo" src="logo.png" alt="" width="800" height="800" />
          </div>

          <div class="lp-cta-row">
            <a
              href="mailto:cognitronics@proton.me"
              class="lp-mail w3s-navbar__cta-link"
              aria-label="Email cognitronics@proton.me"
            >
              <span class="w3s-button">
                <span class="w3s-button__inner lp-mail__metal">
                  <span class="lp-mail__sweep" aria-hidden="true"></span>
                  <svg
                    class="w3s-button__icon"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M4 6.75 12 13l8-6.25M4.75 17.25h14.5A1.75 1.75 0 0 0 21 15.5V8.75A1.75 1.75 0 0 0 19.25 7H4.75A1.75 1.75 0 0 0 3 8.75v6.75A1.75 1.75 0 0 0 4.75 17.25Z"
                    />
                  </svg>
                  <span class="w3s-button__text" aria-live="polite">
                    <span class="w3s-navbar__cta-label lp-cta__label--wide">Get in touch</span>
                    <span class="w3s-navbar__cta-label lp-cta__label--narrow">Email</span>
                  </span>
                </span>
              </span>
            </a>
            <a
              href="https://medium.com/@cognitronics"
              class="lp-mail w3s-navbar__cta-link"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Read more on Medium (opens in a new tab)"
            >
              <span class="w3s-button">
                <span class="w3s-button__inner lp-mail__metal">
                  <span class="lp-mail__sweep" aria-hidden="true"></span>
                  <svg
                    class="w3s-button__icon"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"
                    />
                  </svg>
                  <span class="w3s-button__text">
                    <span class="w3s-navbar__cta-label lp-cta__label--wide">Read more</span>
                    <span class="w3s-navbar__cta-label lp-cta__label--narrow">Read</span>
                  </span>
                </span>
              </span>
            </a>
          </div>
        </div>
      </div>
    </main>

    <script>
      (function () {
        var canvas = document.getElementById("matrix-rain");
        var panel = canvas && canvas.parentElement;
        if (!canvas || !panel) return;

        var ctx = canvas.getContext("2d");
        var fontSize = 10;
        var chars = "0123456789ABCDEF".split("");
        var colors = ["#7CF3BF", "#39D091", "#14784D", "#bab21c", "#dadada"];
        var drops = [];

        function resizeCanvas() {
          canvas.width = panel.offsetWidth;
          canvas.height = panel.offsetHeight;
          var cols = Math.floor(canvas.width / fontSize);
          drops = [];
          for (var i = 0; i < cols; i++) {
            drops[i] = Math.floor(Math.random() * canvas.height);
          }
          ctx.font = fontSize + "px monospace";
        }

        function rain() {
          ctx.fillStyle = "rgba(0, 0, 0, 0.03)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          for (var i = 0; i < drops.length; i++) {
            var char = chars[Math.floor(Math.random() * chars.length)];
            var color = colors[Math.floor(Math.random() * colors.length)];
            var x = i * fontSize;
            var y = drops[i] * fontSize;

            ctx.fillStyle = color;
            ctx.fillText(char, x, y);

            if (Math.random() > 0.99) drops[i] = 0;
            drops[i]++;
          }
        }

        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);
        setInterval(rain, 50);
      })();
    </script>
  </body>
</html>
